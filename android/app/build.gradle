plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.privavoice.privavoice"
    compileSdk = 36
    ndkVersion = "26.1.10909125"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.privavoice.privavoice"
        minSdk = 24
        targetSdk = 36
        versionCode = 1
        versionName = "1.0.0"

        // Enable multidex for larger apps
        multiDexEnabled true
        
        // Only build for arm64-v8a (modern phones) - reduces APK size significantly
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
            // Disable minify and shrink to include native libs
            minifyEnabled = false
            shrinkResources = false
        }
    }

    // Ensure native libs are packaged
    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
        // Don't compress model files - they need to be loaded directly
        resources {
            excludes += ['assets/models/*']
        }
    }

    // Native build configuration for Whisper and Llama
    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.18.1"
        }
    }

    buildFeatures {
        prefab false
    }
    
    // REMOVIDO: assets.srcDirs duplicava os modelos no APK
    // O Flutter plugin já inclui assets do pubspec.yaml automaticamente
}

// IMPORTANT: Keep flutter source pointing to project root
flutter {
    source = "../.."
}

// Add dependencies for prefab (if available)
dependencies {
    // Whisper Android library from JitPack (commit específico)
    implementation("com.github.gouh:whisper-android:9c28bfda35")
}
