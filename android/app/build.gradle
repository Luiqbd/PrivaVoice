plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.privavoice.privavoice"
    compileSdk = 36
    ndkVersion = "27.0.12077973"

    sourceSets {
        main {
            // Garante que o Gradle veja as suas libs nativas manuais
            jniLibs.srcDirs = ['src/main/jniLibs']
        }
    }

    aaptOptions {
        noCompress 'bin', 'gguf', 'so'
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.privavoice.privavoice"
        minSdk = 24
        targetSdk = 36
        versionCode = 1
        versionName = "1.0.0"
        multiDexEnabled true
        
        ndk {
            // Foca na arquitetura 64-bit para máxima performance da IA
            abiFilters 'arm64-v8a'
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
            minifyEnabled = false
            shrinkResources = false
        }
    }

    packagingOptions {
        jniLibs {
            // CRITICAL: Força a extração das libs para que o FFI funcione no Android
            useLegacyPackaging = true
        }
    }

    buildFeatures {
        prefab false
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation("io.github.ljcamargo:llamacpp-kotlin:0.2.0")
    implementation("mx.valdora:whisper-android:1.0.0")
}
