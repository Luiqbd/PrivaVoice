plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.privavoice.privavoice"
    compileSdk = 36
    ndkVersion = "26.1.10909125"

    aaptOptions {
        noCompress 'bin', 'gguf'
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.privavoice.privavoice"
        minSdk = 24
        targetSdk = 36
        versionCode = 1
        versionName = "1.0.0"
        multiDexEnabled true
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
            minifyEnabled = false
            shrinkResources = false
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }

    buildFeatures {
        prefab false
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Llama.cpp - NLP
    implementation("io.github.ljcamargo:llamacpp-kotlin:0.2.0")
    
    // Whisper - STT offline
    implementation("com.github.gouh:whisper-android:v1.0.1")
}
