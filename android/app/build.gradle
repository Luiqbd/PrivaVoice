plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.privavoice.privavoice"
    compileSdk = 36
    ndkVersion = "26.1.10909125"

    // Impede que o Android tente zipar os modelos pesados (essencial para os 1.11 GB)
    aaptOptions {
        noCompress 'bin', 'gguf'
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.privavoice.privavoice"
        minSdk = 24
        targetSdk = 36
        versionCode = 1
        versionName = "1.0.0"

        multiDexEnabled true
        
        // Foca apenas em celulares modernos (64 bits) para reduzir o tamanho do APK
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
            // Mantido false para garantir que as libs nativas (Whisper/Llama) não sejam removidas
            minifyEnabled = false
            shrinkResources = false
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }

    buildFeatures {
        prefab false
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Motor do Llama (Inteligência do Chat)
    implementation("io.github.ljcamargo:llamacpp-kotlin:0.2.0")
    
    // Motor do Whisper (Transcrição) - CORRIGIDO para o Commit que o JitPack aceita
    implementation("com.github.gouh:whisper-android:-9c28bfda35-1")
}
