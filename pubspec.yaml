name: privavoice
description: "On-Device AI-powered voice transcription with military-grade security"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.3
  get_it: ^7.6.7
  equatable: ^2.0.5
  sqflite_common_ffi: ^2.3.3
  ffi: ^2.1.0
  sqlite3_flutter_libs: ^0.5.18
  local_auth: ^2.1.8
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.3
  record: ^5.2.1
  just_audio: ^0.9.36
  path_provider: ^2.1.2
  path: ^1.8.3
  permission_handler: ^11.2.0
  in_app_purchase: ^3.1.1
  uuid: ^4.3.3
  intl: ^0.19.0
  rxdart: ^0.27.7
  share_plus: ^7.2.1
  file_picker: ^8.0.0+1
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

dependency_overrides:
  record_linux: ^1.3.0

flutter:
  uses-material-design: true
  # Assets removidos - modelos devem ser baixados em tempo de execução
  # ou copingados manualmente para assets/models/
  # Para bundled models, adicione os arquivos:
  # - assets/models/whisper-base.bin
  # - assets/models/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf
